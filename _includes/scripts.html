{% include analytics.html %}
{% include /comments-providers/scripts.html %}

<script>
  // ── Dark Mode Toggle ──────────────────────────────────────────────────────
  // On page load, check if the user previously chose dark mode and apply it immediately
  // (before DOMContentLoaded to avoid flash of wrong theme)
  (function () {
    if (localStorage.getItem('darkMode') === 'enabled') {
      document.body.classList.add('dark-mode');
    }
  })();

  document.addEventListener('DOMContentLoaded', function () {
    // Find the nav link whose href contains #dark-mode-toggle
    // (Jekyll prepends base path so href becomes e.g. "/#dark-mode-toggle")
    var toggleLink = document.querySelector('a[href*="#dark-mode-toggle"]');
    if (!toggleLink) return;

    // Update the link text to reflect the current mode
    function updateIcon() {
      if (document.body.classList.contains('dark-mode')) {
        toggleLink.textContent = 'Light';  // Currently dark — click to go light
      } else {
        toggleLink.textContent = 'Dark';   // Currently light — click to go dark
      }
    }

    // Set correct icon on page load
    updateIcon();

    // Intercept clicks on the toggle link
    toggleLink.addEventListener('click', function (e) {
      e.preventDefault();  // Prevent the link from navigating anywhere

      document.body.classList.toggle('dark-mode');

      // Save preference so it persists across pages and sessions
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('darkMode', 'enabled');
      } else {
        localStorage.setItem('darkMode', 'disabled');
      }

      updateIcon();
    });
  });
</script>
