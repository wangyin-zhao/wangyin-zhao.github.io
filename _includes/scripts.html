<script>
  /* Dark mode toggle — enable/disable a preloaded stylesheet */
  function setDarkMode(enabled) {
    var sheet = document.getElementById('dark-mode-css');
    var btn   = document.getElementById('dark-mode-toggle');
    if (sheet) { sheet.disabled = !enabled; }
    if (btn)   { btn.textContent = enabled ? '\u2600\uFE0F Light' : '\uD83C\uDF19 Dark'; }
    localStorage.setItem('darkMode', enabled ? 'enabled' : 'disabled');
  }

  function toggleDarkMode() {
    setDarkMode(localStorage.getItem('darkMode') !== 'enabled');
  }

  /* Apply saved preference immediately */
  document.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('darkMode') === 'enabled';
    setDarkMode(saved);
    var btn = document.getElementById('dark-mode-toggle');
    if (btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        toggleDarkMode();
      });
    }
  });
</script>
