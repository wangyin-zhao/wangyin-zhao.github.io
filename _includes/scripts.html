<script src="{{ base_path }}/assets/js/main.min.js"></script>

{% include analytics.html %}
{% include /comments-providers/scripts.html %}

<script>
  // ── Dark Mode Toggle ──────────────────────────────────────────────────────

  // Inject dark mode CSS directly into the page — bypasses SCSS compilation issues
  var darkCSS = document.createElement('style');
  darkCSS.id  = 'dark-mode-styles';
  darkCSS.textContent = `
    body.dark-mode,
    body.dark-mode .initial-content,
    body.dark-mode #main,
    body.dark-mode .page,
    body.dark-mode .archive {
      background-color: #1a1a2e !important;
      color: #e0e0e0 !important;
    }
    body.dark-mode .masthead,
    body.dark-mode .greedy-nav {
      background-color: #16213e !important;
      border-bottom: 1px solid #0f3460 !important;
    }
    body.dark-mode .masthead a,
    body.dark-mode .visible-links a,
    body.dark-mode .greedy-nav a {
      color: #e0e0e0 !important;
    }
    body.dark-mode .masthead a:hover,
    body.dark-mode .visible-links a:hover {
      color: #ffffff !important;
    }
    body.dark-mode .sidebar,
    body.dark-mode .author__urls-wrapper,
    body.dark-mode .author__content {
      background-color: #16213e !important;
      color: #e0e0e0 !important;
    }
    body.dark-mode .sidebar a,
    body.dark-mode .author__urls a {
      color: #a0c4ff !important;
    }
    body.dark-mode h1,
    body.dark-mode h2,
    body.dark-mode h3,
    body.dark-mode h4,
    body.dark-mode h5,
    body.dark-mode h6 {
      color: #ffffff !important;
    }
    body.dark-mode a {
      color: #a0c4ff !important;
    }
    body.dark-mode a:hover {
      color: #ffffff !important;
    }
    body.dark-mode .page__footer {
      background-color: #0f3460 !important;
      color: #aaaaaa !important;
    }
    body.dark-mode .page__footer a {
      color: #a0c4ff !important;
    }
    body.dark-mode table { color: #e0e0e0 !important; }
    body.dark-mode th    { background-color: #16213e !important; color: #ffffff !important; }
    body.dark-mode tr:nth-child(even) { background-color: #2a2a4a !important; }
    body.dark-mode blockquote {
      border-left-color: #a0c4ff !important;
      color: #aaaaaa !important;
    }
    body.dark-mode p > code,
    body.dark-mode li > code {
      background: #2a2a4a !important;
      border-color: #444 !important;
      color: #f8f8f2 !important;
    }
  `;
  document.head.appendChild(darkCSS);

  // Apply saved preference immediately on page load
  if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
  }

  // Global toggle function — called by onclick in masthead.html
  function toggleDarkMode() {
    var isDark = document.body.classList.toggle('dark-mode');
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
    var btn = document.getElementById('dark-mode-toggle');
    if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
  }

  // Set correct button label on page load
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('dark-mode-toggle');
    if (!btn) return;
    btn.textContent = document.body.classList.contains('dark-mode') ? '☀️ Light' : '🌙 Dark';
  });
</script>
