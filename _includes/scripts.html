<script>
  // ── Dark Mode Toggle ──────────────────────────────────────────────────────

  // Apply saved preference immediately on every page load
  if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
  }

  // Global function called directly by onclick in masthead.html
  function toggleDarkMode() {
    var isDark = document.body.classList.toggle('dark-mode');
    var btn    = document.getElementById('dark-mode-toggle');

    // Save preference so it persists across pages and browser sessions
    localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');

    // Update button label to reflect the new state
    btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
  }

  // On page load, set the correct button label to match current mode
  document.addEventListener('DOMContentLoaded', function () {
    var btn = document.getElementById('dark-mode-toggle');
    if (!btn) return;
    btn.textContent = document.body.classList.contains('dark-mode') ? '☀️ Light' : '🌙 Dark';
  });
</script>
