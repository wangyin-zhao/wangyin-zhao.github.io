# Site Settings
locale                   : "en-US"
title                    : "Wangyin Zhao"
title_separator          : "-"
name                     : &name "Wangyin Zhao"
description              : &description "PhD Candidate in Politics, Durham University"
URL                      : "https://wangyin-zhao.github.io"
baseurl                  :
repository               : "wangyin-zhao/wangyin-zhao.github.io"
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"

# Comments (disabled)
comments:
  provider               :

# Atom feed
atom_feed:
  path                   :

# SEO
google_site_verification :

# Social Sharing
twitter:
  username               : "WangyinZhao"

# Analytics (disabled)
analytics:
  provider               :

# Site Author
author:
  name             : "Wangyin Zhao"
  avatar           : "Profile3.jpg"
  bio              : "ESRC PhD Candidate in Politics at Durham University. Natural disasters & conflict dynamics in civil war."
  location         : "Durham, UK"
  email            : "wangyin.zhao@durham.ac.uk"
  github           : "wangyin-zhao"
  twitter          : "WangyinZhao"
  googlescholar    :
  orcid            :
  linkedin         :
  researchgate     :

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - Capfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - README
  - Rakefile
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - node_modules
  - package.json
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections (only what's actively used)
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/London

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
